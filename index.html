<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dannyca’s Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Supabase - loaded once -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .menu-card { transition: all 0.3s; }
    .menu-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Header -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 bg-orange-600 rounded-2xl flex items-center justify-center text-white text-4xl font-bold">DK</div>
        <div>
          <h1 class="text-3xl font-bold">Dannyca’s Kitchen</h1>
          <p class="text-sm text-gray-500">Filipino • British Fusion</p>
        </div>
      </div>
      <button onclick="toggleCart()" class="flex items-center gap-3 bg-orange-100 hover:bg-orange-200 px-6 py-4 rounded-2xl font-medium">
        <i class="fas fa-shopping-cart"></i> Cart (<span id="cart-count">0</span>)
      </button>
    </div>
  </header>

  <!-- Menu -->
  <section class="max-w-6xl mx-auto px-6 py-16">
    <h2 class="text-5xl font-bold text-center mb-12">Our Menu</h2>
    <div id="menu-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </section>

  <script>
    // Supabase - declared only once
    const supabaseUrl = 'https://tlyyakwgbdsjwcduvfxp.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRseXlha3dnYmRzandjZHV2ZnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDM3MzIsImV4cCI6MjA5NDQxOTczMn0.aAdqjwYaPufXmFhfiBqjxgM76h8KEgOQ24r-p4OUs0E';
    const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

    let cart = [];
    let menuItems = [];

    async function loadMenu() {
      const { data, error } = await supabase.from('products').select('*');
      if (error) {
        console.error(error);
        alert("Database connection failed. Using sample items.");
        menuItems = [
          {id:1, name:"Chicken Adobo", price:9.50, desc:"Classic Filipino dish"},
          {id:2, name:"Sinigang na Baboy", price:10.50, desc:"Tamarind pork soup"}
        ];
      } else {
        menuItems = data || [];
      }
      renderMenu();
    }

    function renderMenu() {
      const container = document.getElementById('menu-container');
      container.innerHTML = menuItems.map(item => `
        <div class="menu-card bg-white p-6 rounded-3xl shadow">
          <h3 class="font-semibold text-xl">${item.name}</h3>
          <p class="text-gray-600">${item.description || item.desc || ''}</p>
          <div class="mt-4 flex justify-between items-center">
            <span class="text-xl font-bold">£${parseFloat(item.price).toFixed(2)}</span>
            <button onclick="addToCart(${item.id})" class="bg-orange-600 text-white px-6 py-2 rounded-xl">Add</button>
          </div>
        </div>
      `).join('');
    }

    function addToCart(id) {
      const item = menuItems.find(i => i.id === id);
      if (item) {
        const existing = cart.find(i => i.id === id);
        if (existing) existing.quantity = (existing.quantity || 1) + 1;
        else cart.push({...item, quantity: 1});
        updateCartCount();
      }
    }

    function updateCartCount() {
      let total = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
      document.getElementById('cart-count').textContent = total;
    }

    function toggleCart() {
      alert("Cart clicked (demo)");
    }

    // Start
    loadMenu();
  </script>
</body>
</html>
