<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dannyca’s Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- IMPORTANT: Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50">

  <!-- Header -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 bg-orange-600 rounded-2xl flex items-center justify-center text-white text-4xl font-bold">DK</div>
        <div>
          <h1 class="text-3xl font-bold">Dannyca’s Kitchen</h1>
          <p class="text-sm text-gray-500">Filipino • British Fusion</p>
        </div>
      </div>
      <button onclick="toggleCart()" class="flex items-center gap-3 bg-orange-100 hover:bg-orange-200 px-6 py-4 rounded-2xl font-medium">
        <i class="fas fa-shopping-cart"></i> 
        Cart (<span id="cart-count">0</span>)
      </button>
    </div>
  </header>

  <!-- Menu -->
  <section class="max-w-6xl mx-auto px-6 py-16">
    <h2 class="text-5xl font-bold text-center mb-12">Our Menu</h2>
    <div id="menu-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </section>

  <!-- Cart Panel -->
  <div id="cart-panel" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-md mx-4 rounded-3xl p-6 max-h-[85vh] overflow-auto">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-bold">Your Cart</h3>
        <button onclick="toggleCart()" class="text-4xl text-gray-400 hover:text-black">×</button>
      </div>
      
      <div id="cart-content" class="space-y-6"></div>

      <div class="border-t pt-6 mt-6">
        <div class="flex justify-between text-xl font-bold">
          <span>Total</span>
          <span id="cart-total">£0.00</span>
        </div>
      </div>

      <button onclick="checkout()" class="w-full mt-8 bg-green-600 text-white py-4 rounded-2xl text-lg font-semibold">
        Proceed to Checkout
      </button>
      <button onclick="toggleCart()" class="w-full mt-3 text-gray-500">Close</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-orange-800 text-white px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 z-50">
    <i class="fas fa-check-circle"></i>
    <span id="toast-text"></span>
  </div>

  <script>
  let cart = [];

  // Supabase Connection
  const supabaseUrl = 'https://tlyyakwgbdsjwcduvfxp.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRseXlha3dnYmRzandjZHV2ZnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDM3MzIsImV4cCI6MjA5NDQxOTczMn0.aAdqjwYaPufXmFhfiBqjxgM76h8KEgOQ24r-p4OUs0E';
  const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

  let menuItems = [];

  // Load from Database
  async function loadMenuFromDB() {
    const { data, error } = await supabase
      .from('products')
      .select('*')
      .order('category');

    if (error) {
      console.error("Database error:", error);
      alert("Could not load from database. Using sample items.");
      menuItems = [ /* fallback items */ ];
    } else {
      menuItems = data || [];
    }
    renderMenu();
  }

  function renderMenu() {
    const container = document.getElementById('menu-container');
    container.innerHTML = menuItems.map(item => `
      <div class="menu-card bg-white p-6 rounded-3xl shadow">
        <h3 class="font-semibold text-xl">${item.name}</h3>
        <p class="text-gray-600">${item.description || item.desc || ''}</p>
        <div class="mt-4 flex justify-between items-center">
          <span class="text-xl font-bold">£${parseFloat(item.price).toFixed(2)}</span>
          <button onclick="addToCart(${item.id})" class="bg-orange-600 text-white px-6 py-2 rounded-xl">Add</button>
        </div>
      </div>
    `).join('');
  }

  function addToCart(id) {
    const item = menuItems.find(i => i.id === id);
    if (!item) return;

    const existing = cart.find(i => i.id === id);
    if (existing) {
      existing.quantity = (existing.quantity || 1) + 1;
    } else {
      cart.push({...item, quantity: 1});
    }
    updateCartCount();
  }

  function changeQuantity(index, delta) {
    if (!cart[index]) return;
    cart[index].quantity = (cart[index].quantity || 1) + delta;
    if (cart[index].quantity < 1) cart[index].quantity = 1;
    renderCart();
    updateCartCount();
  }

  function removeFromCart(index) {
    if (index < 0 || index >= cart.length) return;
    cart.splice(index, 1);
    renderCart();
    updateCartCount();
  }

  function updateCartCount() {
    let totalItems = 0;
    cart.forEach(item => totalItems += (item.quantity || 1));
    const countEl = document.getElementById('cart-count');
    if (countEl) countEl.textContent = totalItems;
  }

  function renderCart() {
    const content = document.getElementById('cart-content');
    let total = 0;

    content.innerHTML = cart.map((item, index) => {
      const qty = item.quantity || 1;
      const itemTotal = item.price * qty;
      total += itemTotal;
      return `
        <div class="flex justify-between items-center border-b pb-4">
          <div class="flex-1">
            <p class="font-medium">${item.name}</p>
            <p class="text-sm text-gray-500">£${item.price.toFixed(2)}</p>
          </div>
          <div class="flex items-center gap-3">
            <button onclick="changeQuantity(${index}, -1)" class="w-8 h-8 border rounded hover:bg-gray-100">-</button>
            <span class="w-8 text-center font-medium">${qty}</span>
            <button onclick="changeQuantity(${index}, 1)" class="w-8 h-8 border rounded hover:bg-gray-100">+</button>
            <button onclick="removeFromCart(${index})" class="ml-4 text-red-500 hover:text-red-700">Remove</button>
          </div>
        </div>`;
    }).join('');

    const totalEl = document.getElementById('cart-total');
    if (totalEl) totalEl.textContent = '£' + total.toFixed(2);
  }

  function toggleCart() {
    const panel = document.getElementById('cart-panel');
    panel.classList.toggle('hidden');
    if (!panel.classList.contains('hidden')) renderCart();
  }

  function checkout() {
    if (cart.length === 0) return;
    alert("✅ Order placed successfully! (Demo mode)");
    cart = [];
    updateCartCount();
    toggleCart();
  }

  // Initialize
  loadMenuFromDB();
</script>
</body>
</html>
