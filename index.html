<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dannyca’s Kitchen | Order Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .hero-bg { background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34b4'); background-size: cover; }
    .menu-card { transition: all 0.3s ease; }
    .menu-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Header -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 bg-orange-600 rounded-2xl flex items-center justify-center text-white text-4xl font-bold">DK</div>
        <div>
          <h1 class="text-3xl font-bold">Dannyca’s Kitchen</h1>
          <p class="text-sm text-gray-500">Filipino • British Fusion</p>
        </div>
      </div>
      <button onclick="toggleCart()" class="flex items-center gap-2 bg-orange-100 hover:bg-orange-200 px-6 py-3 rounded-2xl font-medium">
        <i class="fas fa-shopping-cart"></i> Cart (<span id="cart-count">0</span>)
      </button>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero-bg h-screen flex items-center justify-center text-white text-center px-6">
    <div>
      <h2 class="text-6xl font-bold mb-4">Dannyca’s Kitchen</h2>
      <p class="text-2xl">Filipino-British Fusion</p>
    </div>
  </section>

  <!-- Menu -->
  <section id="menu" class="max-w-6xl mx-auto px-6 py-16">
    <h2 class="text-5xl font-bold text-center mb-16">Our Menu</h2>

    <h3 class="text-3xl font-bold mb-8 border-b pb-4">Starters</h3>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16" id="starters"></div>

    <h3 class="text-3xl font-bold mb-8 border-b pb-4">Main Meals</h3>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16" id="mains"></div>

    <h3 class="text-3xl font-bold mb-8 border-b pb-4">Desserts</h3>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16" id="desserts"></div>

    <h3 class="text-3xl font-bold mb-8 border-b pb-4">Drinks</h3>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16" id="drinks"></div>

    <h3 class="text-3xl font-bold mb-8 border-b pb-4">Snacks & Sides</h3>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="snacks"></div>
  </section>

  <!-- Cart -->
  <div id="cart-overlay" class="hidden fixed inset-0 bg-black/50 z-50" onclick="toggleCart()"></div>
  <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50 overflow-auto">
    <div class="p-6">
      <div class="flex justify-between items-center mb-8">
        <h3 class="text-3xl font-bold">Your Cart</h3>
        <button onclick="toggleCart()" class="text-4xl text-gray-400 hover:text-black">×</button>
      </div>

      <div id="cart-items" class="space-y-6 mb-8"></div>

      <div class="border-t pt-6">
        <div class="flex justify-between text-lg mb-2"><span>Subtotal</span><span id="subtotal">£0.00</span></div>
        <div class="flex justify-between text-lg"><span>Delivery Fee</span><span id="delivery-fee">£3.99</span></div>
        <div class="flex justify-between text-2xl font-bold border-t pt-6 mt-6"><span>Total</span><span id="total">£0.00</span></div>
      </div>

      <button onclick="checkout()" class="w-full mt-10 bg-green-600 hover:bg-green-700 text-white py-5 rounded-2xl text-xl font-semibold">Proceed to Checkout →</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-orange-800 text-white px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3">
    <i class="fas fa-check-circle"></i>
    <span id="toast-text"></span>
  </div>

  <script>
    let cart = [];

    const menuItems = [
      {id:1, name:"Lumpia Rolls", price:6.50, desc:"Crispy Filipino spring rolls", category:"Starters"},
      {id:2, name:"Calamares", price:8.50, desc:"Crispy fried squid", category:"Starters"},
      {id:3, name:"Chicken Adobo", price:9.50, desc:"Classic garlic-soy chicken", category:"Main Meals"},
      {id:4, name:"Sinigang na Baboy", price:10.50, desc:"Tamarind pork soup", category:"Main Meals"},
      {id:5, name:"Lechon Kawali", price:12.50, desc:"Crispy pork belly", category:"Main Meals"},
      {id:6, name:"Halo-Halo", price:6.99, desc:"Mixed shaved ice dessert", category:"Desserts"},
      {id:7, name:"Calamansi Juice", price:3.50, desc:"Fresh Philippine lime drink", category:"Drinks"},
      {id:8, name:"Garlic Rice", price:3.00, desc:"Fragrant garlic rice", category:"Snacks"}
    ];

    function formatPrice(p) { return "£" + p.toFixed(2); }

    function renderAllMenus() {
      const categories = {
        starters: document.getElementById('starters'),
        mains: document.getElementById('mains'),
        desserts: document.getElementById('desserts'),
        drinks: document.getElementById('drinks'),
        snacks: document.getElementById('snacks')
      };

      Object.keys(categories).forEach(key => categories[key].innerHTML = '');

      menuItems.forEach(item => {
        const html = `
          <div class="menu-card bg-white rounded-3xl shadow p-6">
            <h3 class="font-semibold text-xl">${item.name}</h3>
            <p class="text-gray-600 text-sm mt-1">${item.desc}</p>
            <div class="mt-6 flex justify-between items-center">
              <span class="text-3xl font-bold text-orange-600">${formatPrice(item.price)}</span>
              <button onclick="addToCart(${item.id})" class="bg-orange-600 text-white px-8 py-3 rounded-2xl hover:bg-orange-700">Add to Cart</button>
            </div>
          </div>`;
        
        if (item.category === "Starters") categories.starters.innerHTML += html;
        else if (item.category === "Main Meals") categories.mains.innerHTML += html;
        else if (item.category === "Desserts") categories.desserts.innerHTML += html;
        else if (item.category === "Drinks") categories.drinks.innerHTML += html;
        else if (item.category === "Snacks") categories.snacks.innerHTML += html;
      });
    }

    function addToCart(id) {
      const item = menuItems.find(i => i.id === id);
      if (item) {
        const existing = cart.find(i => i.id === id);
        if (existing) {
          existing.quantity = (existing.quantity || 1) + 1;
        } else {
          cart.push({...item, quantity: 1});
        }
        updateCartCount();
        showToast(`${item.name} added to cart`);
      }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-text').textContent = message;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 2000);
    }

    function updateCartCount() {
      document.getElementById('cart-count').textContent = cart.length;
    }

    function toggleCart() {
      const sidebar = document.getElementById('cart-sidebar');
      const overlay = document.getElementById('cart-overlay');
      sidebar.classList.toggle('translate-x-full');
      overlay.classList.toggle('hidden');
      if (!sidebar.classList.contains('translate-x-full')) renderCart();
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let subtotal = 0;

      cart.forEach((item, index) => {
        const qty = item.quantity || 1;
        subtotal += item.price * qty;
        container.innerHTML += `
          <div class="flex justify-between items-center border-b pb-4">
            <div class="flex-1">
              <p class="font-medium">${item.name}</p>
              <p class="text-sm text-gray-500">${formatPrice(item.price)}</p>
            </div>
            <div class="flex items-center gap-3">
              <button onclick="changeQuantity(${index}, -1)" class="w-8 h-8 border rounded hover:bg-gray-100">-</button>
              <span class="w-8 text-center font-medium">${qty}</span>
              <button onclick="changeQuantity(${index}, 1)" class="w-8 h-8 border rounded hover:bg-gray-100">+</button>
              <button onclick="removeFromCart(${index})" class="ml-4 text-red-500 hover:text-red-700">Remove</button>
            </div>
          </div>`;
      });

      document.getElementById('subtotal').textContent = formatPrice(subtotal);
      document.getElementById('total').textContent = formatPrice(subtotal + 3.99);
    }

    function changeQuantity(index, change) {
      cart[index].quantity = (cart[index].quantity || 1) + change;
      if (cart[index].quantity < 1) cart[index].quantity = 1;
      renderCart();
      updateCartCount();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      renderCart();
      updateCartCount();
    }

    function checkout() {
      if (cart.length === 0) return;
      alert("✅ Order Received!\n\nThank you for ordering from Dannyca’s Kitchen.");
      cart = [];
      updateCartCount();
      toggleCart();
    }

    // Initialize
    renderAllMenus();
  </script>
</body>
</html>
