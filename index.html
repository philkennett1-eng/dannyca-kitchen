<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dannyca’s Kitchen | Order Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .hero-bg { background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34b4'); background-size: cover; }
    .menu-card { transition: all 0.3s; }
    .menu-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Header -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 bg-orange-600 rounded-2xl flex items-center justify-center text-white text-4xl font-bold">DK</div>
        <div>
          <h1 class="text-3xl font-bold">Dannyca’s Kitchen</h1>
          <p class="text-sm text-gray-500">Filipino • British Fusion</p>
        </div>
      </div>
      <button onclick="toggleCart()" class="flex items-center gap-2 bg-orange-100 hover:bg-orange-200 px-6 py-3 rounded-2xl font-medium">
        <i class="fas fa-shopping-cart"></i> Cart (<span id="cart-count">0</span>)
      </button>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero-bg h-screen flex items-center justify-center text-white text-center px-6">
    <div>
      <h2 class="text-6xl font-bold mb-4">Dannyca’s Kitchen</h2>
      <p class="text-2xl">Collection or Delivery within 5km</p>
    </div>
  </section>

  <!-- Menu -->
  <section id="menu" class="max-w-6xl mx-auto px-6 py-16">
    <h2 class="text-4xl font-bold text-center mb-12">Our Menu</h2>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="menu-container"></div>
  </section>

  <!-- Cart Sidebar -->
  <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50 overflow-auto">
    <div class="p-6">
      <div class="flex justify-between items-center mb-8">
        <h3 class="text-3xl font-bold">Your Cart</h3>
        <button onclick="toggleCart()" class="text-4xl text-gray-400 hover:text-black">×</button>
      </div>

      <div id="cart-items" class="space-y-6 mb-8 min-h-[200px]"></div>

      <div class="border-t pt-6">
        <div class="flex justify-between text-lg mb-2">
          <span>Subtotal</span>
          <span id="subtotal">£0.00</span>
        </div>
        <div class="flex justify-between text-lg">
          <span>Delivery Fee</span>
          <span id="delivery-fee">£3.99</span>
        </div>
        <div class="flex justify-between text-2xl font-bold border-t pt-6 mt-6">
          <span>Total</span>
          <span id="total">£0.00</span>
        </div>
      </div>

      <button onclick="checkout()" class="w-full mt-10 bg-green-600 hover:bg-green-700 text-white py-5 rounded-2xl text-xl font-semibold">
        Proceed to Checkout →
      </button>
    </div>
  </div>

  <script>
    let cart = [];

    const menuItems = [
      {id:1, name:"Chicken Adobo", price:9.50, desc:"Classic Filipino garlic-soy chicken"},
      {id:2, name:"Sinigang na Baboy", price:10.50, desc:"Tamarind pork soup"},
      {id:3, name:"Lechon Kawali", price:12.50, desc:"Crispy pork belly"},
      {id:4, name:"Full English Breakfast", price:11.99, desc:"Sausage, bacon, eggs & beans"},
      {id:5, name:"Fish & Chips", price:8.99, desc:"British classic"},
      {id:6, name:"Halo-Halo", price:6.50, desc:"Filipino shaved ice dessert"},
      {id:7, name:"Beef Tapa", price:10.99, desc:"Cured beef with garlic rice"},
      {id:8, name:"Pancit Canton", price:8.99, desc:"Stir-fried noodles"},
    ];

    function renderMenu() {
      const container = document.getElementById('menu-container');
      container.innerHTML = '';
      menuItems.forEach(item => {
        container.innerHTML += `
          <div class="menu-card bg-white rounded-3xl shadow p-6">
            <h3 class="font-semibold text-xl">${item.name}</h3>
            <p class="text-gray-600 text-sm mt-1">${item.desc}</p>
            <div class="mt-6 flex justify-between items-center">
              <span class="text-3xl font-bold text-orange-600">£${item.price}</span>
              <button onclick="addToCart(${item.id})" class="bg-orange-600 text-white px-8 py-3 rounded-2xl hover:bg-orange-700">Add to Cart</button>
            </div>
          </div>`;
      });
    }

    function addToCart(id) {
      const item = menuItems.find(i => i.id === id);
      if (item) {
        cart.push(item);
        updateCartCount();
      }
    }

    function updateCartCount() {
      document.getElementById('cart-count').textContent = cart.length;
    }

    function toggleCart() {
      const sidebar = document.getElementById('cart-sidebar');
      sidebar.classList.toggle('translate-x-full');
      if (!sidebar.classList.contains('translate-x-full')) {
        renderCart();
      }
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      container.innerHTML = '';

      if (cart.length === 0) {
        container.innerHTML = '<p class="text-gray-500 text-center py-12">Your cart is empty</p>';
        return;
      }

      let subtotal = 0;

      cart.forEach((item, index) => {
        subtotal += item.price;
        container.innerHTML += `
          <div class="flex justify-between items-center border-b pb-4">
            <div>
              <p class="font-medium">${item.name}</p>
              <p class="text-sm text-gray-500">£${item.price.toFixed(2)}</p>
            </div>
            <button onclick="removeFromCart(${index})" class="text-red-500 hover:text-red-700 text-sm font-medium">Remove</button>
          </div>`;
      });

      document.getElementById('subtotal').textContent = '£' + subtotal.toFixed(2);
      document.getElementById('total').textContent = '£' + (subtotal + 3.99).toFixed(2);
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      renderCart();
      updateCartCount();
    }

    function checkout() {
      if (cart.length === 0) return;
      alert("✅ Order Received!\n\nThank you for your order from Dannyca’s Kitchen.\n\n(This is a demo version)");
    }

    // Initialize
    renderMenu();
  </script>
</body>
</html>
