<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dannyca’s Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hero { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34b4'); background-size: cover; }
  </style>
</head>
<body class="bg-gray-50">

  <header class="bg-white shadow sticky top-0">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-orange-600 rounded-full flex items-center justify-center text-white text-3xl font-bold">DK</div>
        <div>
          <h1 class="text-3xl font-bold">Dannyca’s Kitchen</h1>
          <p class="text-sm text-gray-500">Filipino • British Fusion</p>
        </div>
      </div>
      <a href="#admin" class="px-6 py-3 bg-orange-600 text-white rounded-xl font-medium">Admin</a>
    </div>
  </header>

  <section class="hero h-[80vh] flex items-center justify-center text-white text-center">
    <div>
      <h2 class="text-5xl md:text-6xl font-bold mb-6">Order Delicious Food</h2>
      <p class="text-2xl mb-8">Collection or Delivery within 5km</p>
      <a href="#menu" class="inline-block bg-orange-600 hover:bg-orange-700 text-white text-xl px-10 py-4 rounded-2xl">Browse Menu</a>
    </div>
  </section>

  <section id="menu" class="max-w-6xl mx-auto px-6 py-16">
    <h2 class="text-4xl font-bold text-center mb-12">Menu</h2>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="menu-container"></div>
  </section>

  <script>
    const items = [
      {name:"Chicken Adobo", price:9.50, desc:"Classic Filipino garlic soy chicken"},
      {name:"Sinigang na Baboy", price:10.50, desc:"Tamarind pork soup"},
      {name:"Lechon Kawali", price:12.50, desc:"Crispy pork belly"},
      {name:"Full English Breakfast", price:11.99, desc:"Sausage, bacon, eggs & beans"},
      {name:"Fish & Chips", price:8.99, desc:"British classic"},
      {name:"Halo-Halo", price:6.50, desc:"Filipino shaved ice dessert"}
    ];

    const container = document.getElementById('menu-container');
    items.forEach(item => {
      container.innerHTML += `
        <div class="bg-white p-6 rounded-2xl shadow hover:shadow-xl transition">
          <h3 class="font-semibold text-xl">${item.name}</h3>
          <p class="text-gray-600 mt-2">${item.desc}</p>
          <div class="mt-6 flex justify-between items-center">
            <span class="text-2xl font-bold text-orange-600">£${item.price}</span>
            <button onclick="alert('${item.name} added to cart (demo)')" 
                    class="bg-orange-600 text-white px-6 py-3 rounded-xl hover:bg-orange-700">Add to Cart</button>
          </div>
        </div>`;
    });
  </script>

</body>
</html>
