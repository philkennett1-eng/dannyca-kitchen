<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dannyca’s Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .menu-card { transition: all 0.3s; }
    .menu-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50 p-8">

  <h1 class="text-4xl font-bold mb-8">Dannyca’s Kitchen</h1>

  <!-- Menu -->
  <div id="menu-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <!-- Cart Button -->
  <button onclick="toggleCart()" 
          class="fixed bottom-6 right-6 bg-orange-600 text-white px-6 py-4 rounded-2xl shadow-lg flex items-center gap-3 text-lg font-medium">
    <i class="fas fa-shopping-cart"></i> 
    Cart (<span id="cart-count">0</span>)
  </button>

  <!-- Cart Panel -->
  <div id="cart-panel" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-md mx-4 rounded-3xl p-6 max-h-[85vh] overflow-auto">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-bold">Your Cart</h3>
        <button onclick="toggleCart()" class="text-3xl text-gray-400 hover:text-black">×</button>
      </div>
      
      <div id="cart-content" class="space-y-6"></div>

      <div class="border-t pt-6 mt-6">
        <div class="flex justify-between text-lg font-medium">
          <span>Total</span>
          <span id="cart-total">£0.00</span>
        </div>
      </div>

      <button onclick="checkout()" class="w-full mt-8 bg-green-600 text-white py-4 rounded-2xl text-lg font-semibold">
        Proceed to Checkout
      </button>
      <button onclick="toggleCart()" class="w-full mt-3 text-gray-500">Close Cart</button>
    </div>
  </div>

  <script>
    let cart = [];

    const menuItems = [
      {id:1, name:"Chicken Adobo", price:9.50, desc:"Classic Filipino dish"},
      {id:2, name:"Sinigang na Baboy", price:10.50, desc:"Tamarind pork soup"},
      {id:3, name:"Lechon Kawali", price:12.50, desc:"Crispy pork belly"},
      {id:4, name:"Halo-Halo", price:6.99, desc:"Shaved ice dessert"},
      {id:5, name:"Lumpia Rolls", price:6.50, desc:"Crispy spring rolls"}
    ];

    function renderMenu() {
      const container = document.getElementById('menu-container');
      container.innerHTML = menuItems.map(item => `
        <div class="menu-card bg-white p-6 rounded-3xl shadow">
          <h3 class="font-semibold text-xl">${item.name}</h3>
          <p class="text-gray-600">${item.desc}</p>
          <div class="mt-4 flex justify-between items-center">
            <span class="text-xl font-bold">£${item.price.toFixed(2)}</span>
            <button onclick="addToCart(${item.id})" class="bg-orange-600 text-white px-6 py-2 rounded-xl">Add</button>
          </div>
        </div>
      `).join('');
    }

    function addToCart(id) {
      const item = menuItems.find(i => i.id === id);
      if (item) {
        const existing = cart.find(i => i.id === id);
        if (existing) {
          existing.quantity = (existing.quantity || 1) + 1;
        } else {
          cart.push({...item, quantity: 1});
        }
        updateCartCount();
        // Optional: showToast(`${item.name} added`);
      }
    }

    function changeQuantity(index, delta) {
      cart[index].quantity = (cart[index].quantity || 1) + delta;
      if (cart[index].quantity < 1) cart[index].quantity = 1;
      renderCart();
      updateCartCount();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      renderCart();
      updateCartCount();
    }

    function updateCartCount() {
      document.getElementById('cart-count').textContent = cart.length;
    }

    function renderCart() {
      const content = document.getElementById('cart-content');
      let total = 0;

      content.innerHTML = cart.map((item, index) => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        return `
          <div class="flex justify-between items-center border-b pb-4">
            <div>
              <p class="font-medium">${item.name}</p>
              <p class="text-sm text-gray-500">£${item.price.toFixed(2)}</p>
            </div>
            <div class="flex items-center gap-3">
              <button onclick="changeQuantity(${index}, -1)" class="w-8 h-8 border rounded hover:bg-gray-100">-</button>
              <span class="w-8 text-center font-medium">${item.quantity}</span>
              <button onclick="changeQuantity(${index}, 1)" class="w-8 h-8 border rounded hover:bg-gray-100">+</button>
              <button onclick="removeFromCart(${index})" class="ml-4 text-red-500 hover:text-red-700">Remove</button>
            </div>
          </div>`;
      }).join('');

      document.getElementById('cart-total').textContent = '£' + total.toFixed(2);
    }

    function toggleCart() {
      const panel = document.getElementById('cart-panel');
      panel.classList.toggle('hidden');
      if (!panel.classList.contains('hidden')) {
        renderCart();
      }
    }

    function checkout() {
      if (cart.length === 0) return;
      alert("✅ Order placed successfully! (Demo mode)");
      cart = [];
      updateCartCount();
      toggleCart();
    }

    // Initialize
    renderMenu();
  </script>
</body>
</html>
