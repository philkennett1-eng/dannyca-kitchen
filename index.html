<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="p-8">

  <h1 class="text-3xl font-bold mb-8">Supabase Connection Test</h1>
  <div id="status" class="p-4 border rounded-xl"></div>

  <script>
    const supabaseUrl = 'https://tlyyakwgbdsjwcduvfxp.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRseXlha3dnYmRzandjZHV2ZnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDM3MzIsImV4cCI6MjA5NDQxOTczMn0.aAdqjwYaPufXmFhfiBqjxgM76h8KEgOQ24r-p4OUs0E';

    const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

    async function testConnection() {
      const statusDiv = document.getElementById('status');
      
      try {
        const { data, error } = await supabase.from('products').select('name, price').limit(5);
        
        if (error) {
          statusDiv.innerHTML = `<span class="text-red-600">Error: ${error.message}</span>`;
          console.error(error);
        } else {
          statusDiv.innerHTML = `<span class="text-green-600">Success! Found ${data.length} products.</span><pre>${JSON.stringify(data, null, 2)}</pre>`;
        }
      } catch (e) {
        statusDiv.innerHTML = `<span class="text-red-600">Connection failed: ${e.message}</span>`;
      }
    }

    window.onload = testConnection;
  </script>
</body>
</html>
